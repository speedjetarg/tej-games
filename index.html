<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dachshund Dash</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    h1 {
      font-size: 1.6rem;
      color: #5a3e28;
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #game-wrapper {
      position: relative;
    }

    canvas {
      border: 3px solid #5a3e28;
      border-radius: 4px;
      background: #fffdf7;
      display: block;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,253,247,0.88);
      border-radius: 2px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      color: #5a3e28;
      margin-bottom: 8px;
    }

    #overlay p {
      color: #7a5c3a;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    #score-display {
      position: absolute;
      top: 10px;
      right: 16px;
      font-size: 1rem;
      color: #5a3e28;
      font-weight: bold;
    }

    #hi-display {
      position: absolute;
      top: 10px;
      right: 90px;
      font-size: 1rem;
      color: #a08060;
    }
  </style>
</head>
<body>
  <h1>🌭 Dachshund Dash 🌭</h1>
  <div id="game-wrapper">
    <canvas id="canvas" width="800" height="300"></canvas>
    <div id="score-display">0</div>
    <div id="hi-display">HI 0</div>
    <div id="overlay">
      <h2>Dachshund Dash</h2>
      <p>Press <strong>Space</strong> or <strong>↑</strong> to jump</p>
      <p>Press <strong>↓</strong> to duck</p>
      <p style="margin-top:12px; font-size:0.85rem; color:#a08060;">Avoid the hotdog towers!</p>
    </div>
  </div>

  <script>
  (() => {
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const overlay      = document.getElementById('overlay');
    const scoreDisplay = document.getElementById('score-display');
    const hiDisplay    = document.getElementById('hi-display');

    const W = canvas.width;
    const H = canvas.height;
    const GROUND = H - 50;

    // ── palette ──────────────────────────────────────────────────
    const COL = {
      ground:   '#c8a87a',
      shadow:   '#b09060',
      dog:      '#8B4513',
      dogLight: '#c47a3a',
      dogDark:  '#5a2d0c',
      ear:      '#6b3010',
      nose:     '#222',
      eye:      '#111',
      bun:      '#d4914a',
      bunShine: '#e8b87a',
      bunBot:   '#c07838',
      sausage:  '#a03010',
      sausageH: '#c04820',
      mustard:  '#e8c020',
      ketchup:  '#cc1010',
      cloud:    '#e8e0d0',
    };

    // ── state ─────────────────────────────────────────────────────
    let state = 'idle'; // idle | running | dead
    let score = 0;
    let hiScore = 0;
    let frame = 0;
    let speed = 5;
    let obstacles = [];
    let clouds = [];
    let nextObstacle = 90;
    let nextCloud = 60;
    let raf;

    // ── dog ───────────────────────────────────────────────────────
    const dog = {
      x: 80,
      y: GROUND,
      w: 72,
      h: 40,
      vy: 0,
      ducking: false,
      legFrame: 0,
      // duck dims
      duckW: 80,
      duckH: 26,
    };

    function dogW() { return dog.ducking ? dog.duckW : dog.w; }
    function dogH() { return dog.ducking ? dog.duckH : dog.h; }
    function dogTop() { return dog.y - dogH(); }

    function jump() {
      if (dog.y >= GROUND && !dog.ducking) {
        dog.vy = -14;
      }
    }

    // ── input ─────────────────────────────────────────────────────
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (state === 'idle' || state === 'dead') startGame();
        else jump();
      }
      if (e.code === 'ArrowDown') { e.preventDefault(); dog.ducking = true; }
    });
    document.addEventListener('keyup', e => {
      keys[e.code] = false;
      if (e.code === 'ArrowDown') dog.ducking = false;
    });
    canvas.addEventListener('click', () => {
      if (state === 'idle' || state === 'dead') startGame();
      else jump();
    });

    // ── start / reset ─────────────────────────────────────────────
    function startGame() {
      score = 0;
      frame = 0;
      speed = 5;
      obstacles = [];
      clouds = [];
      nextObstacle = 80;
      nextCloud = 60;
      dog.y = GROUND;
      dog.vy = 0;
      dog.ducking = false;
      dog.legFrame = 0;
      overlay.style.display = 'none';
      state = 'running';
      cancelAnimationFrame(raf);
      loop();
    }

    function gameOver() {
      state = 'dead';
      if (score > hiScore) hiScore = score;
      hiDisplay.textContent = 'HI ' + hiScore;
      overlay.innerHTML = `
        <h2>Woof! 💀</h2>
        <p>Score: <strong>${score}</strong></p>
        <p style="margin-top:8px">Press <strong>Space</strong> / click to try again</p>
      `;
      overlay.style.display = 'flex';
    }

    // ── obstacle factory ──────────────────────────────────────────
    function makeObstacle() {
      // stack of 1–3 hotdogs
      const count  = 1 + Math.floor(Math.random() * 3);
      const bunW   = 44;
      const bunH   = 18;
      const sausH  = 10;
      const unitH  = bunH + sausH; // each hotdog layer height
      const totalH = count * unitH + 4; // a little base
      return {
        x: W + 20,
        w: bunW,
        h: totalH,
        count,
        bunW, bunH, sausH,
      };
    }

    function makeCloud() {
      return {
        x: W + 10,
        y: 40 + Math.random() * 60,
        w: 60 + Math.random() * 50,
        speed: 1 + Math.random(),
      };
    }

    // ── collision ─────────────────────────────────────────────────
    function collides(obs) {
      const pad = 8;
      const dx  = dog.x + pad;
      const dw  = dogW() - pad * 2;
      const dy  = dogTop() + pad;
      const dh  = dogH() - pad;

      const ox = obs.x + 4;
      const ow = obs.w - 8;
      const oy = GROUND - obs.h;
      const oh = obs.h;

      return dx < ox + ow && dx + dw > ox && dy < oy + oh && dy + dh > oy;
    }

    // ── drawing ───────────────────────────────────────────────────

    function drawGround() {
      ctx.fillStyle = COL.ground;
      ctx.fillRect(0, GROUND, W, 3);
      // dashed line
      ctx.fillStyle = COL.shadow;
      for (let x = (frame * speed * 0.5) % 30; x < W; x += 30) {
        ctx.fillRect(x, GROUND + 3, 18, 1);
      }
    }

    function drawCloud(c) {
      ctx.fillStyle = COL.cloud;
      // simple puffy cloud
      const puffs = [
        [0, 0, 20], [18, -8, 24], [40, -4, 20], [56, 2, 16],
      ];
      for (const [px, py, r] of puffs) {
        ctx.beginPath();
        ctx.arc(c.x + px * (c.w / 76), c.y + py, r * (c.w / 76), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Hotdog stack obstacle
    function drawObstacle(obs) {
      const baseX = obs.x;
      const baseY = GROUND;

      for (let i = 0; i < obs.count; i++) {
        const y = baseY - (i + 1) * (obs.bunH + obs.sausH);
        drawHotdog(baseX, y, obs.bunW, obs.bunH, obs.sausH);
      }
    }

    function drawHotdog(x, y, bW, bH, sH) {
      // bottom bun
      ctx.fillStyle = COL.bunBot;
      roundRect(x, y + sH, bW, bH * 0.55, 4);
      ctx.fill();

      // sausage
      ctx.fillStyle = COL.sausage;
      roundRect(x - 2, y + sH * 0.2, bW + 4, sH * 0.9, 4);
      ctx.fill();
      // sausage highlight
      ctx.fillStyle = COL.sausageH;
      roundRect(x + 4, y + sH * 0.25, bW - 12, sH * 0.35, 2);
      ctx.fill();

      // ketchup squiggle
      ctx.strokeStyle = COL.ketchup;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + 8, y + sH * 0.55);
      for (let i = 0; i < 5; i++) {
        ctx.quadraticCurveTo(
          x + 10 + i * 6, y + sH * (i % 2 === 0 ? 0.2 : 0.85),
          x + 16 + i * 6, y + sH * 0.55
        );
      }
      ctx.stroke();

      // mustard squiggle
      ctx.strokeStyle = COL.mustard;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x + 6, y + sH * 0.65);
      for (let i = 0; i < 4; i++) {
        ctx.quadraticCurveTo(
          x + 9 + i * 7, y + sH * (i % 2 === 0 ? 0.3 : 0.9),
          x + 15 + i * 7, y + sH * 0.6
        );
      }
      ctx.stroke();

      // top bun
      ctx.fillStyle = COL.bun;
      roundRect(x, y, bW, bH * 0.65, [8, 8, 0, 0]);
      ctx.fill();
      // top bun shine
      ctx.fillStyle = COL.bunShine;
      ctx.globalAlpha = 0.35;
      roundRect(x + 6, y + 3, bW * 0.45, bH * 0.2, 4);
      ctx.fill();
      ctx.globalAlpha = 1;

      // sesame seeds on top bun
      ctx.fillStyle = '#e8d090';
      const seeds = [[10,5],[22,3],[34,6],[16,10],[28,9]];
      for (const [sx, sy] of seeds) {
        ctx.beginPath();
        ctx.ellipse(x + sx, y + sy, 2.5, 1.2, 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Dachshund drawing
    function drawDog() {
      const x  = dog.x;
      const y  = dog.y;
      const leg = Math.sin(dog.legFrame) * 7;
      const leg2 = Math.cos(dog.legFrame) * 7;

      ctx.save();
      ctx.translate(x, y);

      if (dog.ducking) {
        drawDogDucking();
      } else {
        drawDogStanding(leg, leg2);
      }

      ctx.restore();
    }

    function drawDogStanding(leg, leg2) {
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(36, 2, 32, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      // legs (back)
      ctx.fillStyle = COL.dogDark;
      // back legs
      ctx.fillRect(12, -14, 7, 14 + leg2);
      ctx.fillRect(20, -14, 7, 14 - leg2);
      // front legs
      ctx.fillRect(50, -14, 7, 14 + leg);
      ctx.fillRect(58, -14, 7, 14 - leg);

      // body — long sausage shape
      ctx.fillStyle = COL.dog;
      roundRect(-4, -28, 76, 26, 13);
      ctx.fill();

      // belly lighter strip
      ctx.fillStyle = COL.dogLight;
      roundRect(4, -20, 58, 12, 6);
      ctx.fill();

      // back/top darker
      ctx.fillStyle = COL.dogDark;
      ctx.globalAlpha = 0.25;
      roundRect(-4, -28, 76, 10, [13, 13, 0, 0]);
      ctx.fill();
      ctx.globalAlpha = 1;

      // tail
      ctx.strokeStyle = COL.dog;
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-4, -22);
      ctx.quadraticCurveTo(-18, -38, -10, -46);
      ctx.stroke();

      // head
      ctx.fillStyle = COL.dog;
      roundRect(58, -40, 30, 24, 8);
      ctx.fill();

      // snout
      ctx.fillStyle = COL.dogLight;
      roundRect(80, -33, 16, 14, 5);
      ctx.fill();

      // ear (floppy)
      ctx.fillStyle = COL.ear;
      ctx.beginPath();
      ctx.ellipse(65, -34, 8, 14, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // eye
      ctx.fillStyle = COL.eye;
      ctx.beginPath();
      ctx.arc(76, -33, 3.5, 0, Math.PI * 2);
      ctx.fill();
      // eye shine
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(77.5, -34.5, 1.2, 0, Math.PI * 2);
      ctx.fill();

      // nose
      ctx.fillStyle = COL.nose;
      ctx.beginPath();
      ctx.ellipse(94, -28, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      // collar
      ctx.fillStyle = '#e03030';
      ctx.fillRect(60, -20, 26, 5);
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(73, -17, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawDogDucking() {
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(36, 2, 36, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // legs squat
      ctx.fillStyle = COL.dogDark;
      ctx.fillRect(10, -12, 7, 12);
      ctx.fillRect(20, -12, 7, 12);
      ctx.fillRect(52, -12, 7, 12);
      ctx.fillRect(62, -12, 7, 12);

      // body flat/long
      ctx.fillStyle = COL.dog;
      roundRect(-4, -22, 88, 20, 10);
      ctx.fill();

      ctx.fillStyle = COL.dogLight;
      roundRect(4, -16, 70, 10, 5);
      ctx.fill();

      // tail
      ctx.strokeStyle = COL.dog;
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-4, -16);
      ctx.quadraticCurveTo(-16, -28, -8, -34);
      ctx.stroke();

      // head low
      ctx.fillStyle = COL.dog;
      roundRect(70, -28, 26, 20, 7);
      ctx.fill();

      // snout
      ctx.fillStyle = COL.dogLight;
      roundRect(88, -23, 14, 12, 4);
      ctx.fill();

      // ear
      ctx.fillStyle = COL.ear;
      ctx.beginPath();
      ctx.ellipse(76, -22, 7, 12, -0.2, 0, Math.PI * 2);
      ctx.fill();

      // eye
      ctx.fillStyle = COL.eye;
      ctx.beginPath();
      ctx.arc(86, -21, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(87.2, -22.2, 1.1, 0, Math.PI * 2);
      ctx.fill();

      // nose
      ctx.fillStyle = COL.nose;
      ctx.beginPath();
      ctx.ellipse(100, -17, 3.5, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // collar
      ctx.fillStyle = '#e03030';
      ctx.fillRect(72, -13, 22, 4);
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(83, -11, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── helpers ───────────────────────────────────────────────────
    function roundRect(x, y, w, h, r) {
      if (typeof r === 'number') r = [r, r, r, r];
      ctx.beginPath();
      ctx.moveTo(x + r[0], y);
      ctx.lineTo(x + w - r[1], y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r[1]);
      ctx.lineTo(x + w, y + h - r[2]);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
      ctx.lineTo(x + r[3], y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r[3]);
      ctx.lineTo(x, y + r[0]);
      ctx.quadraticCurveTo(x, y, x + r[0], y);
      ctx.closePath();
    }

    // ── game loop ─────────────────────────────────────────────────
    function update() {
      frame++;

      // score + speed
      if (frame % 6 === 0) {
        score++;
        scoreDisplay.textContent = String(score).padStart(5, '0');
      }
      speed = 5 + Math.floor(score / 100) * 0.8;

      // dog physics
      if (dog.y >= GROUND) {
        dog.y  = GROUND;
        dog.vy = 0;
      } else {
        dog.vy += 0.7;
        dog.y  += dog.vy;
      }

      // leg animation
      if (dog.y >= GROUND && !dog.ducking) {
        dog.legFrame += speed * 0.18;
      }

      // spawn obstacles
      nextObstacle--;
      if (nextObstacle <= 0) {
        obstacles.push(makeObstacle());
        nextObstacle = 70 + Math.random() * 80 - Math.min(score / 20, 30);
      }

      // move obstacles
      for (const obs of obstacles) obs.x -= speed;
      obstacles = obstacles.filter(o => o.x + o.w > -10);

      // spawn clouds
      nextCloud--;
      if (nextCloud <= 0) {
        clouds.push(makeCloud());
        nextCloud = 80 + Math.random() * 120;
      }
      for (const c of clouds) c.x -= c.speed;
      clouds = clouds.filter(c => c.x + c.w > -10);

      // collision
      for (const obs of obstacles) {
        if (collides(obs)) { gameOver(); return; }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // sky
      const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
      sky.addColorStop(0, '#dff0ff');
      sky.addColorStop(1, '#fffdf7');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, GROUND);

      for (const c of clouds) drawCloud(c);
      drawGround();
      for (const obs of obstacles) drawObstacle(obs);
      drawDog();
    }

    function loop() {
      if (state !== 'running') return;
      update();
      draw();
      raf = requestAnimationFrame(loop);
    }

    // initial idle draw
    draw();
  })();
  </script>
</body>
</html>
